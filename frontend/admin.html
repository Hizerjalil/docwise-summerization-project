<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCWISE — Admin Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--card-bg);
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 3rem; display: flex; align-items: center; gap: 10px; }
        .nav-item { 
            padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; gap: 12px; color: var(--text-muted); text-decoration: none; margin-bottom: 8px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .nav-item i { font-size: 1.1rem; }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); padding: 3rem; width: calc(100% - var(--sidebar-width)); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        h1 { font-size: 1.8rem; font-weight: 700; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* Content Area (Table) */
        .content-card { background: var(--card-bg); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-admin { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .badge-user { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); }

        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 0.85rem; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* Loading Spinner */
        #loading { display: none; justify-content: center; align-items: center; height: 200px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-btn { margin-top: auto; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--text); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-shield-halved"></i> DOCWISE
        </div>
        <a href="#" class="nav-item active" id="nav-users" onclick="showSection('users')">
            <i class="fas fa-users"></i> User Accounts
        </a>
        <a href="#" class="nav-item" id="nav-summaries" onclick="showSection('summaries')">
            <i class="fas fa-file-lines"></i> Summary Logs
        </a>
        
        <a href="work.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to App
        </a>
        <a href="#" class="nav-item" onclick="logout()" style="margin-top: 10px;">
            <i class="fas fa-right-from-bracket"></i> Logout
        </a>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="section-title">User Management</h1>
            <button class="btn btn-primary" onclick="loadData()"><i class="fas fa-rotate"></i> Refresh</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Total Users</p>
                <p class="stat-value" id="count-users">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Total Summaries</p>
                <p class="stat-value" id="count-summaries">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">System Status</p>
                <p class="stat-value" style="color: var(--success);">ACTIVE</p>
            </div>
        </div>

        <div class="content-card">
            <div id="loading"><div class="spinner"></div></div>
            <div id="content-area">
                <!-- Dynamically filled -->
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
